server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── WebSocket (chat + WebRTC signaling) ───────────────────────────
    # Must come before the general API block — needs HTTP Upgrade header
    location /ws/ {
        proxy_pass         http://auth_service:8001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── Driver service ────────────────────────────────────────────────
    location /driver/ {
        proxy_pass         http://driver_service:8002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Auth service REST API ─────────────────────────────────────────
    location ~ ^/(auth|trips|drivers|notifications|health|metrics|frontend-metrics) {
        proxy_pass         http://auth_service:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── SPA fallback ──────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}

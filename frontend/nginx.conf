server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # WebSocket (chat + WebRTC signaling)
    location /ws/ {
        proxy_pass         http://auth_service:8001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Admin service REST + WebSocket
    # Use resolver + variable so nginx starts even if admin_service is temporarily down
    location /admin-api/ {
        resolver           127.0.0.11 valid=10s;
        set                $admin_upstream http://admin_service:8003;
        rewrite            ^/admin-api/(.*)$ /$1 break;
        proxy_pass         $admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Driver service
    location /driver/ {
        proxy_pass         http://driver_service:8002;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Auth service REST
    location ~ ^/(auth|trips|drivers|notifications|wallet|health|metrics|frontend-metrics) {
        proxy_pass         http://auth_service:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  build-and-push:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Compute the sslip.io domain from the EC2 IP (dots → dashes).
      # e.g. 3.85.53.81 → 3-85-53-81.sslip.io
      # Caddy uses this domain to get a real Let's Encrypt certificate.
      - name: Compute sslip.io domain
        run: |
          EC2_DOMAIN=$(echo '${{ secrets.EC2_HOST }}' | tr '.' '-').sslip.io
          echo "EC2_DOMAIN=$EC2_DOMAIN" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push auth_service
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bodaboda-backend:latest

      - name: Build and push driver_service
        uses: docker/build-push-action@v5
        with:
          context: ./driver_service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bodaboda-driver:latest

      # Frontend build — VITE_API_BASE_URL is optional (app falls back to
      # window.location.origin at runtime), but setting it avoids any edge cases.
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bodaboda-frontend:latest
          build-args: |
            VITE_API_BASE_URL=https://${{ env.EC2_DOMAIN }}
            VITE_DRIVER_SERVICE_URL=https://${{ env.EC2_DOMAIN }}

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Compute sslip.io domain
        run: |
          EC2_DOMAIN=$(echo '${{ secrets.EC2_HOST }}' | tr '.' '-').sslip.io
          echo "EC2_DOMAIN=$EC2_DOMAIN" >> $GITHUB_ENV

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

      - name: Deploy to staging
        run: |
          ssh -i ~/.ssh/ec2_key \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << ENDSSH
            set -e
            cd /opt/bodaboda
            git pull origin main

            echo "=== Disk space before cleanup ==="
            df -h /

            echo "=== Cleaning Docker cache ==="
            docker stop \$(docker ps -q) 2>/dev/null || true
            docker rm \$(docker ps -aq) 2>/dev/null || true
            docker system prune -af --volumes 2>/dev/null || true

            echo "=== Disk space after cleanup ==="
            df -h /

            echo "=== Pulling new images ==="
            docker pull ${{ secrets.DOCKER_USERNAME }}/bodaboda-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/bodaboda-driver:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/bodaboda-frontend:latest

            echo "=== Starting stack ==="
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} \
            CADDY_DOMAIN=${{ env.EC2_DOMAIN }} \
            docker compose up -d

            echo "=== Waiting for services (alembic migrations run on startup) ==="
            sleep 60

            echo "=== Health checks ==="
            curl -sf http://localhost:8001/health && echo "✅ Auth API OK" || (echo "❌ Auth API FAILED" && exit 1)
            curl -sf http://localhost:8002/health && echo "✅ Driver API OK" || (echo "❌ Driver API FAILED" && exit 1)

            echo "=== MQTT broker check ==="
            docker exec mosquitto mosquitto_pub \
              -t rides/deploy/test \
              -m '{"event_type":"DEPLOY_CHECK","status":"ok"}' \
              -q 1 && echo "✅ MQTT OK" || echo "⚠️  MQTT check skipped"

            echo "✅ Staging passed!"
          ENDSSH

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - name: Compute sslip.io domain
        run: |
          EC2_DOMAIN=$(echo '${{ secrets.EC2_HOST }}' | tr '.' '-').sslip.io
          echo "EC2_DOMAIN=$EC2_DOMAIN" >> $GITHUB_ENV

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

      - name: Deploy to production
        run: |
          ssh -i ~/.ssh/ec2_key \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << ENDSSH
            set -e
            cd /opt/bodaboda

            echo "=== Production is live ==="
            docker compose ps

            docker compose exec -T mosquitto mosquitto_pub \
              -t rides/deploy/test \
              -m '{"event_type":"DEPLOY","status":"ok"}' \
              -q 1 && echo "✅ MQTT broker responding" || echo "⚠️  MQTT check failed"

            echo ""
            echo "✅ Deploy complete!"
            echo "   Frontend   : https://${{ env.EC2_DOMAIN }}"
            echo "   Auth API   : https://${{ env.EC2_DOMAIN }}/auth/"
            echo "   Driver API : https://${{ env.EC2_DOMAIN }}/driver/"
            echo "   MQTT (wss) : wss://${{ env.EC2_DOMAIN }}/mqtt"
          ENDSSH

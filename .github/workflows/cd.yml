name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  build-and-push:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            mtalibani/bodaboda-backend:latest
            mtalibani/bodaboda-backend:v1
            mtalibani/bodaboda-backend:${{ github.event.workflow_run.head_sha }}

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Deploy to staging
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "docker pull mtalibani/bodaboda-backend:latest && \
             docker stop bodaboda-staging || true && \
             docker rm bodaboda-staging || true && \
             docker run -d --name bodaboda-staging \
               -p 8101:8001 \
               -e DATABASE_URL='postgresql+asyncpg://postgres:password@localhost:5432/bodaboda' \
               -e JWT_SECRET='staging-secret' \
               -e ACCESS_TOKEN_EXPIRE_MINUTES=30 \
               -e REFRESH_TOKEN_EXPIRE_DAYS=7 \
               mtalibani/bodaboda-backend:latest && \
             sleep 5 && \
             docker ps | grep bodaboda-staging && \
             curl -f http://localhost:8101/health || echo 'Health check failed'"
          rm -f /tmp/deploy_key

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to production
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "docker pull mtalibani/bodaboda-backend:latest && \
             docker stop bodaboda-production || true && \
             docker rm bodaboda-production || true && \
             docker run -d --name bodaboda-production \
               -p 8001:8001 \
               -e DATABASE_URL='postgresql+asyncpg://postgres:password@localhost:5432/bodaboda' \
               -e JWT_SECRET='production-secret' \
               -e ACCESS_TOKEN_EXPIRE_MINUTES=30 \
               -e REFRESH_TOKEN_EXPIRE_DAYS=7 \
               mtalibani/bodaboda-backend:latest && \
             sleep 5 && \
             docker ps | grep bodaboda-production && \
             curl -f http://localhost:8001/health || echo 'Health check failed'"
          rm -f /tmp/deploy_key

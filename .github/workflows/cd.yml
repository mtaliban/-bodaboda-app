name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  build-and-push:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push auth_service
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bodaboda-backend:latest

      - name: Build and push driver_service
        uses: docker/build-push-action@v5
        with:
          context: ./driver_service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bodaboda-driver:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bodaboda-frontend:latest
          build-args: |
            VITE_API_BASE_URL=http://${{ secrets.EC2_HOST }}:8001
            VITE_DRIVER_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8002

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

      - name: Debug SSH key
        run: |
          echo "Key first line:"
          head -1 ~/.ssh/ec2_key
          echo "Key last line:"
          tail -1 ~/.ssh/ec2_key
          echo "Key length (chars):"
          wc -c < ~/.ssh/ec2_key
          echo "Testing SSH connection..."
          ssh -i ~/.ssh/ec2_key \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            -o ConnectTimeout=10 \
            -v \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo SSH_OK" 2>&1 | tail -20

      - name: Deploy to staging
        run: |
          ssh -i ~/.ssh/ec2_key \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd /opt/bodaboda
            git pull origin main

            echo "=== Pulling new images ==="
            docker pull ${{ secrets.DOCKER_USERNAME }}/bodaboda-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/bodaboda-driver:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/bodaboda-frontend:latest

            echo "=== Stopping old containers ==="
            docker stop $(docker ps -q) 2>/dev/null || true
            docker rm $(docker ps -aq) 2>/dev/null || true

            echo "=== Starting stack ==="
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker compose up -d

            echo "=== Waiting for services (alembic migrations run on startup) ==="
            sleep 60

            echo "=== Health checks ==="
            curl -sf http://localhost:8001/health && echo "✅ Auth API OK" || (echo "❌ Auth API FAILED" && exit 1)
            curl -sf http://localhost:8002/health && echo "✅ Driver API OK" || (echo "❌ Driver API FAILED" && exit 1)

            echo "=== MQTT broker check ==="
            docker exec mosquitto mosquitto_pub \
              -t rides/deploy/test \
              -m '{"event_type":"DEPLOY_CHECK","status":"ok"}' \
              -q 1 && echo "✅ MQTT OK" || echo "⚠️  MQTT check skipped"

            echo "✅ Staging passed!"
          ENDSSH

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

      - name: Deploy to production
        run: |
          ssh -i ~/.ssh/ec2_key \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd /opt/bodaboda

            echo "=== Production is live ==="
            docker compose ps

            docker compose exec -T mosquitto mosquitto_pub \
              -t rides/deploy/test \
              -m '{"event_type":"DEPLOY","status":"ok"}' \
              -q 1 && echo "✅ MQTT broker responding" || echo "⚠️  MQTT check failed"

            echo ""
            echo "✅ Deploy complete!"
            echo "   Frontend  : http://${{ secrets.EC2_HOST }}"
            echo "   Auth API  : http://${{ secrets.EC2_HOST }}:8001"
            echo "   Driver API: http://${{ secrets.EC2_HOST }}:8002"
            echo "   MQTT WS   : ws://${{ secrets.EC2_HOST }}:9001"
          ENDSSH

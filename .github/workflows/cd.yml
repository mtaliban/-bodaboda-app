name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  build-and-push:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push auth_service
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bodaboda-backend:latest

      - name: Build and push driver_service
        uses: docker/build-push-action@v5
        with:
          context: ./driver_service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bodaboda-driver:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bodaboda-frontend:latest

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

      - name: Deploy to staging
        run: |
          ssh -i ~/.ssh/ec2_key \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << ENDSSH
            set -e
            cd /opt/bodaboda
            git pull origin main

            docker stop \$(docker ps -q) 2>/dev/null || true
            docker rm \$(docker ps -aq) 2>/dev/null || true
            docker system prune -af --volumes 2>/dev/null || true

            docker pull ${{ secrets.DOCKER_USERNAME }}/bodaboda-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/bodaboda-driver:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/bodaboda-frontend:latest

            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker compose up -d

            sleep 60

            curl -sf http://localhost:8001/health && echo "Auth OK" || (echo "Auth FAILED" && exit 1)
            curl -sf http://localhost:8002/health && echo "Driver OK" || (echo "Driver FAILED" && exit 1)

            echo "Staging passed!"
          ENDSSH

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

      - name: Deploy to production
        run: |
          ssh -i ~/.ssh/ec2_key \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << ENDSSH
            set -e
            cd /opt/bodaboda
            docker compose ps
            echo "Deploy complete! Site: http://${{ secrets.EC2_HOST }}"
          ENDSSH

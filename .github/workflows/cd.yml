name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  build-and-push:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push auth_service
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend:latest

      - name: Build and push driver_service
        uses: docker/build-push-action@v5
        with:
          context: ./driver_service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-driver:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-frontend:latest
          build-args: |
            VITE_API_BASE_URL=http://${{ secrets.EC2_HOST }}:8001
            VITE_DRIVER_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8002

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keygen -y -f ~/.ssh/ec2_key > /dev/null && echo "SSH key valid ✅"

      - name: Deploy to production
        run: |
          ssh -i ~/.ssh/ec2_key \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            echo "=== Pulling latest code ==="
            if [ -d "/opt/bodaboda/.git" ]; then
              cd /opt/bodaboda
              git pull origin main
            else
              sudo mkdir -p /opt/bodaboda
              sudo chown $USER:$USER /opt/bodaboda
              git clone https://github.com/mtaliban/-bodaboda-app.git /opt/bodaboda
              cd /opt/bodaboda
            fi

            echo "=== Stopping old containers ==="
            docker stop $(docker ps -q) 2>/dev/null || true
            docker rm $(docker ps -aq) 2>/dev/null || true

            echo "=== Pulling latest images ==="
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-backend:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-driver:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bodaboda-frontend:latest

            echo "=== Starting services ==="
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} docker compose up -d

            echo "=== Waiting for services ==="
            sleep 10

            echo "=== Running services ==="
            docker compose ps

            echo "=== Checking MQTT broker ==="
            docker compose exec -T mosquitto mosquitto_pub \
              -t rides/deploy/test \
              -m '{"event_type":"DEPLOY","status":"ok"}' \
              -q 1 && echo "✅ MQTT broker responding" || echo "⚠️  MQTT check failed"

            echo ""
            echo "✅ Deploy complete!"
            echo "   Frontend  : http://${{ secrets.EC2_HOST }}:5173"
            echo "   Auth API  : http://${{ secrets.EC2_HOST }}:8001"
            echo "   Driver API: http://${{ secrets.EC2_HOST }}:8002"
          ENDSSH

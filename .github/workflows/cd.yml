name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  deploy-production:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keygen -y -f ~/.ssh/ec2_key > /dev/null && echo "SSH key valid ✅"

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/ec2_key \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "echo SSH_OK && whoami"

      - name: Deploy full stack to production
        run: |
          ssh -i ~/.ssh/ec2_key \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e

            echo "=== Pulling latest code ==="
            if [ -d "/opt/bodaboda/.git" ]; then
              cd /opt/bodaboda
              git pull origin main
            else
              sudo mkdir -p /opt/bodaboda
              sudo chown $USER:$USER /opt/bodaboda
              git clone https://github.com/mtaliban/-bodaboda-app.git /opt/bodaboda
              cd /opt/bodaboda
            fi

            echo "=== Setting environment ==="
            export VITE_API_BASE_URL=http://${{ secrets.EC2_HOST }}:8001
            export VITE_DRIVER_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8002

            echo "=== Stopping old containers ==="
            docker stop $(docker ps -q) 2>/dev/null || true
            docker rm $(docker ps -aq) 2>/dev/null || true
            docker compose down --remove-orphans 2>/dev/null || true

            echo "=== Building and starting all services ==="
            docker compose build
            docker compose up -d

            echo "=== Waiting for services to start ==="
            sleep 15

            echo "=== Running services ==="
            docker compose ps

            echo "=== Checking MQTT broker ==="
            docker compose exec -T mosquitto mosquitto_pub \
              -t rides/deploy/test \
              -m '{"event_type":"DEPLOY","status":"ok"}' \
              -q 1 && echo "✅ MQTT broker responding" || echo "⚠️  MQTT check failed"

            echo ""
            echo "✅ Deploy complete!"
            echo "   Frontend  : http://${{ secrets.EC2_HOST }}:5173"
            echo "   Auth API  : http://${{ secrets.EC2_HOST }}:8001"
            echo "   Driver API: http://${{ secrets.EC2_HOST }}:8002"
            echo "   Mosquitto : ${{ secrets.EC2_HOST }}:1883"
          ENDSSH

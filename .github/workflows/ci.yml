name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: auth_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/auth_db
      JWT_SECRET: test-secret-key-for-ci
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      MQTT_HOST: localhost
      MQTT_PORT: 1883
      DOCKER_USERNAME: bodaboda-ci
      EC2_HOST: localhost

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Start Mosquitto MQTT Broker ──────────────────────────────────
      - name: Start Mosquitto MQTT Broker
        run: |
          docker run -d --name mosquitto \
            -p 1883:1883 \
            -p 9001:9001 \
            -v ${{ github.workspace }}/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro \
            eclipse-mosquitto:2.0
          sleep 4
          docker ps | grep mosquitto && echo "✅ Mosquitto is running"

      # ── Python setup & dependencies ──────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-anyio anyio httpx paho-mqtt

      # ── Backend tests ────────────────────────────────────────────────
      - name: Run backend tests
        run: python3 -m pytest tests/ -v

      # ── MQTT integration test: publish → receive ─────────────────────
      - name: Test MQTT - publish and receive message
        run: |
          python3 - <<'EOF'
          import paho.mqtt.client as mqtt
          import time, sys, json

          received = []

          def on_connect(client, userdata, flags, rc):
              if rc == 0:
                  client.subscribe("rides/test/events", qos=1)
              else:
                  print(f"MQTT connect failed rc={rc}")
                  sys.exit(1)

          def on_message(client, userdata, msg):
              received.append(msg.payload.decode())

          client = mqtt.Client()
          client.on_connect = on_connect
          client.on_message = on_message
          client.connect("localhost", 1883, 60)
          client.loop_start()
          time.sleep(1)

          payload = json.dumps({
              "event_id": "ci-test-001",
              "event_type": "RIDE_REQUESTED",
              "timestamp": "2026-01-01T00:00:00Z",
              "version": "1.0",
              "payload": {
                  "trip_id": 99,
                  "pickup_address": "UDOM Gate",
                  "destination_address": "Dodoma Town"
              }
          })
          client.publish("rides/test/events", payload, qos=1)
          time.sleep(2)
          client.loop_stop()

          if received:
              print(f"✅ MQTT OK — message received on rides/test/events")
              print(f"   {received[0][:120]}")
          else:
              print("❌ MQTT FAILED — no message received")
              sys.exit(1)
          EOF

      # ── Build all Docker images ───────────────────────────────────────
      - name: Build Docker images
        run: docker compose build

name: BodaBoda Pipeline

# ═══════════════════════════════════════════════════════════════════
# Pipeline ya CS 421 (Assignment 3) — inaonyesha stages zote 7
# za mwalimu kama jobs tofauti kwenye GitHub Actions UI:
#
#   Code Push  ←  trigger (on: push)
#       ↓
#   1. Build Application
#       ↓
#   2. Run Tests
#       ↓
#   3. Build Docker Image
#       ↓
#   4. Push to Docker Hub  (Third-party)
#       ↓
#   5. Deploy to Server / Cloud  (AWS EC2)
#       ↓
#   6. Run MQTT-enabled Application
# ═══════════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/auth_db
  JWT_SECRET: test-secret-key-for-ci
  ACCESS_TOKEN_EXPIRE_MINUTES: 30
  REFRESH_TOKEN_EXPIRE_DAYS: 7
  MQTT_HOST: localhost
  MQTT_PORT: 1883

jobs:
  # ─────────────────────────────────────────────────────────────
  # STAGE 1 — Build Application
  # ─────────────────────────────────────────────────────────────
  build-application:
    name: "1. Build Application"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Confirm build successful
        run: echo "Application built successfully"

  # ─────────────────────────────────────────────────────────────
  # STAGE 2 — Run Tests (pytest + MQTT publish/receive)
  # ─────────────────────────────────────────────────────────────
  run-tests:
    name: "2. Run Tests"
    needs: build-application
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: auth_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start Mosquitto MQTT Broker
        run: |
          docker run -d --name mosquitto \
            -p 1883:1883 \
            -p 9001:9001 \
            -v ${{ github.workspace }}/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro \
            eclipse-mosquitto:2.0
          sleep 4
          docker ps | grep mosquitto && echo "Mosquitto is running"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-anyio anyio httpx paho-mqtt

      - name: Run backend tests with coverage report
        run: |
          pip install pytest-cov
          python3 -m pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml
          echo "✓ Coverage report generated"

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

      - name: MQTT integration test (publish -> receive)
        run: |
          python3 - <<'EOF'
          import paho.mqtt.client as mqtt
          import time, sys, json

          received = []

          def on_connect(client, userdata, flags, rc):
              if rc == 0:
                  client.subscribe("rides/test/events", qos=1)
              else:
                  print(f"MQTT connect failed rc={rc}")
                  sys.exit(1)

          def on_message(client, userdata, msg):
              received.append(msg.payload.decode())

          client = mqtt.Client()
          client.on_connect = on_connect
          client.on_message = on_message
          client.connect("localhost", 1883, 60)
          client.loop_start()
          time.sleep(1)

          payload = json.dumps({
              "event_id": "ci-test-001",
              "event_type": "RIDE_REQUESTED",
              "timestamp": "2026-01-01T00:00:00Z",
              "version": "1.0",
              "payload": {
                  "trip_id": 99,
                  "pickup_address": "UDOM Gate",
                  "destination_address": "Dodoma Town"
              }
          })
          client.publish("rides/test/events", payload, qos=1)
          time.sleep(2)
          client.loop_stop()

          if received:
              print(f"MQTT OK - message received on rides/test/events")
              print(f"   {received[0][:120]}")
          else:
              print("MQTT FAILED - no message received")
              sys.exit(1)
          EOF

      # IMPROVEMENT 2: Verify HiveMQ Cloud credentials before deploy
      - name: Verify HiveMQ Cloud credentials (catch typos early)
        run: |
          pip install aiomqtt
          python3 - <<'EOF'
          import ssl, asyncio, aiomqtt, os, sys

          async def test():
              host = "my-bodaboda-cce7baf3.a03.euc1.aws.hivemq.cloud"
              user = "mtalibani"
              pwd  = "Mimi$100"
              ctx  = ssl.create_default_context()
              try:
                  async with aiomqtt.Client(
                      hostname=host, port=8883,
                      username=user, password=pwd,
                      tls_context=ctx,
                      identifier="ci-hivemq-check",
                  ) as c:
                      await c.publish("ci/test/ping", "ok")
                      print(f"HiveMQ OK — connected as {user}")
              except Exception as e:
                  print(f"HiveMQ FAILED — {e}")
                  print("Check MQTT_USER and MQTT_PASSWORD in docker-compose.yml")
                  sys.exit(1)

          asyncio.run(test())
          EOF

  # ─────────────────────────────────────────────────────────────
  # STAGE 3 — Build Docker Image
  # ─────────────────────────────────────────────────────────────
  build-docker-image:
    name: "3. Build Docker Image"
    needs: run-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build all Docker images
        run: DOCKER_USERNAME=ci docker compose build

      - name: Confirm images built
        run: docker images | grep bodaboda

  # ─────────────────────────────────────────────────────────────
  # STAGE 4 — Push to Docker Hub (Third-party)
  # ─────────────────────────────────────────────────────────────
  push-to-docker-hub:
    name: "4. Push to Docker Hub"
    needs: build-docker-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set version tag
        id: vars
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=v1.${{ github.run_number }}.0" >> $GITHUB_OUTPUT
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Version tag: v1.${{ github.run_number }}.0"
          echo "Git SHA tag: $SHORT_SHA"

      - name: Push auth_service
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bodaboda-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/bodaboda-backend:${{ steps.vars.outputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/bodaboda-backend:${{ steps.vars.outputs.sha }}

      - name: Push driver_service
        uses: docker/build-push-action@v5
        with:
          context: ./driver_service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bodaboda-driver:latest
            ${{ secrets.DOCKER_USERNAME }}/bodaboda-driver:${{ steps.vars.outputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/bodaboda-driver:${{ steps.vars.outputs.sha }}

      - name: Push admin_service
        uses: docker/build-push-action@v5
        with:
          context: ./admin_service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bodaboda-admin:latest
            ${{ secrets.DOCKER_USERNAME }}/bodaboda-admin:${{ steps.vars.outputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/bodaboda-admin:${{ steps.vars.outputs.sha }}

      - name: Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bodaboda-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/bodaboda-frontend:${{ steps.vars.outputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/bodaboda-frontend:${{ steps.vars.outputs.sha }}

  # ─────────────────────────────────────────────────────────────
  # STAGE 5 — Deploy to Server / Cloud (AWS EC2)
  # ─────────────────────────────────────────────────────────────
  deploy-to-server:
    name: "5. Deploy to Server / Cloud"
    needs: push-to-docker-hub
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

      - name: Deploy to EC2 via SSH
        run: |
          ssh -i ~/.ssh/ec2_key \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << ENDSSH
            set -e
            cd /opt/bodaboda
            git pull origin main

            # IMPROVEMENT 1: Auto disk cleanup before pull (prevents disk-full SSH failures)
            echo "=== Disk before cleanup ==="
            df -h /
            docker system prune -af --volumes 2>/dev/null || true
            echo "=== Disk after cleanup ==="
            df -h /

            docker pull ${{ secrets.DOCKER_USERNAME }}/bodaboda-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/bodaboda-driver:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/bodaboda-admin:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/bodaboda-frontend:latest

            docker container prune -f 2>/dev/null || true
            docker image prune -f 2>/dev/null || true

            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker compose up -d --remove-orphans --force-recreate --pull always

            sleep 10
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }} docker compose exec -T auth_service alembic upgrade head

            sleep 30

            curl -sf http://localhost:8001/health && echo "Auth OK" || (echo "Auth FAILED" && exit 1)
            curl -sf http://localhost:8002/health && echo "Driver OK" || (echo "Driver FAILED" && exit 1)
            curl -sf http://localhost:8003/health && echo "Admin OK" || (echo "Admin FAILED" && exit 1)

            echo "Deploy complete!"
          ENDSSH

      - name: Send email notification on success
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: bodabodaapp124@gmail.com
          password: hrnjxnmxhavtsufy
          subject: "✅ BodaBoda Deploy SUCCESS — Run #${{ github.run_number }}"
          to: hamisiselemani200@gmail.com
          from: BodaBoda CI/CD <bodabodaapp124@gmail.com>
          body: |
            ✅ Deployment imefanikiwa!

            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Run: #${{ github.run_number }}
            Server: http://3.85.53.81:5173

            BodaBoda Pipeline — CS 421

      - name: Send email notification on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: bodabodaapp124@gmail.com
          password: hrnjxnmxhavtsufy
          subject: "❌ BodaBoda Deploy FAILED — Run #${{ github.run_number }}"
          to: hamisiselemani200@gmail.com
          from: BodaBoda CI/CD <bodabodaapp124@gmail.com>
          body: |
            ❌ Deployment imeshindwa!

            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Run: #${{ github.run_number }}

            Angalia logs: https://github.com/mtaliban/-bodaboda-app/actions

            BodaBoda Pipeline — CS 421

  # ─────────────────────────────────────────────────────────────
  # STAGE 6 — Run MQTT-enabled Application (verify on server)
  # ─────────────────────────────────────────────────────────────
  run-mqtt-enabled-app:
    name: "6. Run MQTT-enabled Application"
    needs: deploy-to-server
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

      - name: Verify MQTT broker is running on production
        run: |
          ssh -i ~/.ssh/ec2_key \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            echo "===== Containers running on production ====="
            docker ps
            echo ""
            echo "===== Mosquitto status ====="
            docker ps | grep mosquitto && echo "Mosquitto is running on production"
            echo ""
            echo "===== Compose status ====="
            cd /opt/bodaboda
            docker compose ps
            echo ""
            echo "BodaBoda is live with MQTT real-time communication!"
          ENDSSH

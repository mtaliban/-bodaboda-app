# Deploy: 2026-06-17 — HiveMQ username fix (mtalibani)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_net
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - app_net
    restart: unless-stopped

  driver_service:
    build:
      context: ./driver_service
    image: ${DOCKER_USERNAME}/bodaboda-driver:latest
    container_name: driver_service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/auth_db
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      MQTT_HOST: my-bodaboda-cce7baf3.a03.euc1.aws.hivemq.cloud
      MQTT_PORT: 8883
      MQTT_USER: mtalibani
      MQTT_PASSWORD: "Mimi$100"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_net
    restart: unless-stopped

  auth_service:
    build:
      context: .
    image: ${DOCKER_USERNAME}/bodaboda-backend:latest
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/auth_db
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 465
      SMTP_USER: bodabodaapp124@gmail.com
      SMTP_PASSWORD: hrnjxnmxhavtsufy
      SMTP_FROM: bodabodaapp124@gmail.com
      SMTP_STARTTLS: "false"
      MQTT_HOST: my-bodaboda-cce7baf3.a03.euc1.aws.hivemq.cloud
      MQTT_PORT: 8883
      MQTT_USER: mtalibani
      MQTT_PASSWORD: "Mimi$100"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_net
    restart: unless-stopped

  admin_service:
    build:
      context: ./admin_service
    image: ${DOCKER_USERNAME}/bodaboda-admin:latest
    container_name: admin_service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/auth_db
      MQTT_HOST: my-bodaboda-cce7baf3.a03.euc1.aws.hivemq.cloud
      MQTT_PORT: 8883
      MQTT_USER: mtalibani
      MQTT_PASSWORD: "Mimi$100"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: BodaBoda@Admin2026!
      ADMIN_JWT_SECRET: admin-super-secret-key-change-in-prod
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_DRIVER_SERVICE_URL: ${VITE_DRIVER_SERVICE_URL:-}
    image: ${DOCKER_USERNAME}/bodaboda-frontend:latest
    ports:
      - "80:80"
      - "5173:80"
    depends_on:
      - auth_service
    networks:
      - app_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  app_net:
    driver: bridge

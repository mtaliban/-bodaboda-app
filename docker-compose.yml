services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_net
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    # Port 1883 for internal MQTT; port 9001 kept for direct WS in local dev.
    # In production (HTTPS), browsers use wss:///mqtt via Caddy instead.
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - app_net
    restart: unless-stopped

  driver_service:
    build:
      context: ./driver_service
    image: ${DOCKER_USERNAME}/bodaboda-driver:latest
    container_name: driver_service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/auth_db
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - app_net
    restart: unless-stopped

  auth_service:
    build:
      context: .
    image: ${DOCKER_USERNAME}/bodaboda-backend:latest
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/auth_db
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 465
      SMTP_USER: bodabodaapp124@gmail.com
      SMTP_PASSWORD: hrnjxnmxhavtsufy
      SMTP_FROM: bodabodaapp124@gmail.com
      SMTP_STARTTLS: "false"
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - app_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # VITE_API_BASE_URL is optional — frontend falls back to window.location.origin
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_DRIVER_SERVICE_URL: ${VITE_DRIVER_SERVICE_URL:-}
    image: ${DOCKER_USERNAME}/bodaboda-frontend:latest
    expose:
      - "80"
    depends_on:
      - auth_service
    networks:
      - app_net
    restart: unless-stopped

  # Caddy handles HTTPS automatically.
  # On EC2: set CADDY_DOMAIN=3-85-53-81.sslip.io and Caddy gets a real
  # Let's Encrypt certificate — no browser warnings, no manual setup.
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
    depends_on:
      - frontend
      - auth_service
      - driver_service
      - mosquitto
    networks:
      - app_net
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  app_net:
    driver: bridge

metricbeat.modules:
  - module: docker
    metricsets:
      - cpu
      - memory
      - network
      - diskio
      - container
    hosts: ["unix:///var/run/docker.sock"]
    period: 10s
    enabled: true

  - module: system
    metricsets:
      - cpu
      - load
      - memory
      - network
    period: 10s
    enabled: true

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]

setup.kibana:
  host: "http://kibana:5601"

logging.level: info
